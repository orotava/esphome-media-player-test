################################### 
# PARA FAVORITOS SONOS
################################### 
globals:
  # Declaración limpia que ESPHome valida correctamente
  - id: array_playlists
    type: std::vector<std::string>
    restore_value: no
    
# Genera el array con la lista de favoritos
text_sensor:
  - platform: homeassistant
    id: playlists_sonos_crudo
    entity_id: sensor.sonos_favorites_limpio
    on_value:
      then:
        - lambda: |-
            if (x.empty()) return;

            // 1. Limpiamos y rellenamos el Array (Código que ya te compila)
            id(array_playlists).clear();
            std::string texto = x;
            std::string delimitador = ";";
            size_t pos = 0;
            std::string token;

            while ((pos = texto.find(delimitador)) != std::string::npos) {
                token = texto.substr(0, pos);
                if (!token.empty()) {
                    id(array_playlists).push_back(token);
                }
                texto.erase(0, pos + delimitador.length());
            }
            if (!texto.empty()) {
                id(array_playlists).push_back(texto);
            }
            
            // =========================================================================
            // LÓGICA DE ACTUALIZACIÓN: TEXTO Y VISIBILIDAD DE BOTONES 
            // =========================================================================
            
            // 1. Array de tus etiquetas de texto (Para inyectar los nombres)
            lv_obj_t* etiquetas_texto[] = {
                id(fav_btn_1), id(fav_btn_2), id(fav_btn_3), id(fav_btn_4), id(fav_btn_5), id(fav_btn_6), id(fav_btn_7), id(fav_btn_8)
                , id(fav_btn_9), id(fav_btn_10), id(fav_btn_11), id(fav_btn_12), id(fav_btn_13), id(fav_btn_14), id(fav_btn_15)
                , id(fav_btn_16), id(fav_btn_17)
            };

            // 2. Array de tus botones contenedores (Para controlar la visibilidad del Grid)
            lv_obj_t* botones_contenedores[] = {
                id(favoritos_1), id(favoritos_2), id(favoritos_3), id(favoritos_4), id(favoritos_5), id(favoritos_6), id(favoritos_7), id(favoritos_8)
                , id(favoritos_9), id(favoritos_10), id(favoritos_11), id(favoritos_12), id(favoritos_13), id(favoritos_14), id(favoritos_15)
                , id(favoritos_16), id(favoritos_17)
            };

            int total_botones = std::size(etiquetas_texto); 

            for (int i = 0; i < total_botones; i++) {
                if (i < id(array_playlists).size()) {
                    std::string nombre_favorito = id(array_playlists)[i];
                    // 1. Generar componentes RGB aleatorios para el fondo de pantalla del boton solo hasta 200, evitar fondos claros, texto en blanco
                    uint8_t r = esp_random() % 200;
                    uint8_t g = esp_random() % 200;
                    uint8_t b = esp_random() % 200;
                    
                    // Asignamos el texto a la etiqueta correspondiente
                    lv_label_set_text(etiquetas_texto[i], nombre_favorito.c_str());
                    
                    // MOSTRAR BOTÓN: Eliminamos la bandera "HIDDEN" de LVGL de forma dinámica
                    lv_obj_clear_flag(botones_contenedores[i], LV_OBJ_FLAG_HIDDEN);
                    // FONDO BOTÓN: Color aleatorio de fondo del boton forma dinámica
                     lv_obj_set_style_bg_color(botones_contenedores[i], lv_color_make(r, g, b), LV_PART_MAIN );
                    
                } else {
                    // Si te quedas sin favoritos en la lista, limpiamos el texto
                    lv_label_set_text(etiquetas_texto[i], "---");
            
                    // OCULTAR BOTÓN: Añadimos la bandera "HIDDEN" para que el Grid se reorganize
                    lv_obj_add_flag(botones_contenedores[i], LV_OBJ_FLAG_HIDDEN);
                }
            }

            ESP_LOGI("custom", "¡Botones actualizados y visibilidad gestionada por el Grid!");
script:
  - id: reproducir_sonos_script
    mode: restart
    parameters:
      favorito_seleccionado: string
    then:
      - homeassistant.service:
          service: media_player.select_source
          variables:
            target: !lambda |-
              return id(is_tv_mode) ? id(linked_media_player_entity).state : id(media_player_entity).state;
          data_template:
            entity_id: "{{ target }}"
            source: !lambda 'return favorito_seleccionado;'

