#=========================================================
# Theme new button 
#=========================================================
# Definition of button and light styles, also used in Sonos Favourites
lvgl:
  style_definitions:
      - id: webhook
        bg_color: $button_webhook_color
      - id: control
        bg_color: $button_control_color
substitutions:
  icon_font: icon_font
  text_font: roboto19_font
  button_on_color: "0xFF8C00"
  button_text_color: "0xFFFFFF"
  button_control_color: "0x313131"
  button_webhook_color: "0x212121"
  button_height_single: 110px
  button_width: 150px
  padding: 12px
  radius: 8px
  slider_background_color: "0x505050"
  slider_active_color: "0x2D2D2D"
  slider_knob_color: "0xE5E5E5"
      
  theme:
    button:
      text_font: $text_font
      scroll_on_focus: false
      radius: $radius
      width: $button_width
      height: $button_height_single
      pad_all: $padding
      shadow_width: 0
      text_color: $button_text_color
      checked:
        bg_color: $button_on_color
        text_color: $button_text_color
        
###############################################################################
# To use the internal relays
# Uses GPIO 40, 2 y 1, Exposed only to HA
############################################################################### 
light:
  - platform: binary
    name: "Relay 1"
    output: light_output_1
    restore_mode: ALWAYS_OFF

  - platform: binary
    name: "Relay 2"
    output: light_output_2
    restore_mode: ALWAYS_OFF

  - platform: binary
    name: "Relay 3"
    output: light_output_3
    restore_mode: ALWAYS_OFF

output:
  - platform: gpio
    pin: 40
    id: light_output_1
    inverted: true # Set it to false if the light turns on backwards

  - platform: gpio
    pin: 2 
    id: light_output_2
    inverted: true # Set it to false if the light turns on backwards
    
  - platform: gpio
    pin: 1
    id: light_output_3
    inverted: false # Set it to true if the light turns on backwards

###############################################################################
# Scripts for light panel (panel_luces)
###############################################################################
script:
  # Open light panel
  - id: open_luces_panel
    mode: single
    then:
      - lambda: 'id(is_luces_open) = true;'
      - lvgl.widget.show: panel_luces
      - script.execute: start_luces_panel_timeout
            
  - id: start_luces_panel_timeout
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(speaker_panel_timeout).state > 0;'
          then:
            - delay: !lambda 'return (uint32_t)(id(speaker_panel_timeout).state * 1000);'
            - if:
                condition:
                  lambda: 'return id(is_luces_open);'
                then:
                  - script.execute: close_luces_panel
# Close light panel
  - id: close_luces_panel
    mode: single
    then:
      - script.stop: start_luces_panel_timeout
      - lvgl.widget.hide: panel_luces
      - lambda: 'id(is_luces_open) = false;'
      - delay: 5s
      - script.execute: toggle_ui
