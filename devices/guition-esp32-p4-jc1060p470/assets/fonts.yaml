# Roboto fonts used by the music dashboard.
# Extended Latin glyphs cover accented characters (ñ, é, ü, µ, etc.) and common
# symbols (©, ®, ™, €, •, etc.) and typographic quotes (' ' " ") for song metadata.
# Two content lines in each >- block: the fold produces exactly one space glyph.
# roboto56_font keeps its legacy ID but uses larger, light-weight digits for the volume dial.
# roboto_thin160_font uses Thin weight for the clock screensaver (digits + colon only).
font:
  - file: "gfonts://Roboto@Thin"
    id: roboto_thin160_font
    size: 240
    bpp: 4
    glyphs: " 0123456789:"

  - file: "gfonts://Roboto@Light"
    id: roboto56_font
    size: 80
    bpp: 4
    glyphs: " 0123456789%"

