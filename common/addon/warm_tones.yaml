# =============================================================================
# WARM TONES - Day/night screen color temperature
# =============================================================================
# Shifts album art toward warm tones (reduced blue, slight red boost).
# Separate day and night warmth sliders follow the same sun/sensor-based
# day/night detection used by the backlight brightness system.
#
# The tint is applied directly to the RGB565 image buffer after accent color
# extraction, using precomputed lookup tables for speed. The undo/redo
# pattern allows changing warmth without reloading the image.
# =============================================================================


# -----------------------------------------------------------------------------
# Last applied warmth (for undo/redo) and retint flag
# -----------------------------------------------------------------------------
globals:
  - id: warm_tone_last_w
    type: float
    initial_value: '0.0f'
  - id: warm_tone_retint
    type: bool
    initial_value: 'false'


# -----------------------------------------------------------------------------
# HA sliders: Day / Night warmth (0-100%)
# -----------------------------------------------------------------------------
number:
  - platform: template
    name: "Day: Screen Warmth"
    id: screen_warmth_day
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 30
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:white-balance-sunny"
    entity_category: config
    on_value:
      then:
        - lambda: 'id(warm_tone_retint) = true;'
        - script.execute: apply_warm_tones

  - platform: template
    name: "Night: Screen Warmth"
    id: screen_warmth_night
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 60
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:weather-night"
    entity_category: config
    on_value:
      then:
        - lambda: 'id(warm_tone_retint) = true;'
        - script.execute: apply_warm_tones


# -----------------------------------------------------------------------------
# Apply warmth to current image buffer (LUT-based RGB565 tint)
# -----------------------------------------------------------------------------
script:
  - id: warm_tones_done
    mode: single
    then:
      - lambda: 'return;'

  - id: apply_warm_tones
    mode: queued
    then:
      - lambda: |-
          uint32_t apply_start = millis();
          bool retint = id(warm_tone_retint);
          id(warm_tone_retint) = false;

          bool is_day = id(day_night_sensor_entity).state.empty()
              ? (id(sun_state_sensor).has_state() && id(sun_state_sensor).state == "above_horizon")
              : id(custom_day_night_is_day);
          float w = (is_day ? id(screen_warmth_day).state : id(screen_warmth_night).state) / 100.0f;
          float last_w = retint ? id(warm_tone_last_w) : 0.0f;

          if (retint && fabsf(w - last_w) < 0.01f) return;

          ESP_LOGI("warm", "Warmth: %d%% -> %d%%", (int)(last_w * 100.0f + 0.5f), (int)(w * 100.0f + 0.5f));

          const float red_boost = ${warm_tone_red_boost};
          const float green_reduce = ${warm_tone_green_reduce};
          const float blue_reduce = ${warm_tone_blue_reduce};
          const float contrast_boost = ${artwork_contrast_boost};
          const float saturation_boost = ${artwork_saturation_boost};

          float r_undo = (last_w > 0.005f) ? 1.0f / (1.0f + last_w * red_boost) : 1.0f;
          float g_undo = (last_w > 0.005f) ? 1.0f / (1.0f - last_w * green_reduce) : 1.0f;
          float b_undo = (last_w > 0.005f) ? 1.0f / (1.0f - last_w * blue_reduce) : 1.0f;
          float r_apply = 1.0f + w * red_boost;
          float g_apply = 1.0f - w * green_reduce;
          float b_apply = 1.0f - w * blue_reduce;

          uint8_t r_lut[32], g_lut[64], b_lut[32];
          for (int i = 0; i < 32; i++) {
            int v = (i << 3) | (i >> 2);
            int nv = (int)(v * r_undo * r_apply);
            r_lut[i] = (uint8_t)((nv > 255 ? 255 : (nv < 0 ? 0 : nv)) >> 3);
          }
          for (int i = 0; i < 64; i++) {
            int v = (i << 2) | (i >> 4);
            int nv = (int)(v * g_undo * g_apply);
            g_lut[i] = (uint8_t)((nv > 255 ? 255 : (nv < 0 ? 0 : nv)) >> 2);
          }
          for (int i = 0; i < 32; i++) {
            int v = (i << 3) | (i >> 2);
            int nv = (int)(v * b_undo * b_apply);
            b_lut[i] = (uint8_t)((nv > 255 ? 255 : (nv < 0 ? 0 : nv)) >> 3);
          }

          auto *img = id(is_tv_mode) ? id(tv_art_background) : id(album_art_background);
          if (!img) return;
          #if ESPHOME_VERSION_CODE >= VERSION_CODE(2026, 4, 0)
          auto *dsc = img->get_lv_image_dsc();
          #else
          auto *dsc = img->get_lv_img_dsc();
          #endif
          if (!dsc || !dsc->data) return;
          uint8_t *buf = const_cast<uint8_t*>(dsc->data);
          int total = img->get_width() * img->get_height();
          ESP_LOGD("warm", "Warmth apply start: image=%dx%d pixels=%d retint=%s",
                   img->get_width(), img->get_height(), total, retint ? "yes" : "no");
          for (int i = 0; i < total; i++) {
            int pos = i * 2;
            uint16_t px = buf[pos] | (buf[pos + 1] << 8);
            int r = ((int)r_lut[(px >> 11) & 0x1F] << 3);
            int g = ((int)g_lut[(px >> 5) & 0x3F] << 2);
            int b = ((int)b_lut[px & 0x1F] << 3);
            if (!retint && contrast_boost > 0.001f) {
              float c = 1.0f + contrast_boost;
              r = (int)((r - 128) * c + 128);
              g = (int)((g - 128) * c + 128);
              b = (int)((b - 128) * c + 128);
            }
            if (!retint && saturation_boost > 0.001f) {
              float s = 1.0f + saturation_boost;
              int gray = (r * 77 + g * 150 + b * 29) >> 8;
              r = (int)((r - gray) * s + gray);
              g = (int)((g - gray) * s + gray);
              b = (int)((b - gray) * s + gray);
            }
            if (r > 255) r = 255; else if (r < 0) r = 0;
            if (g > 255) g = 255; else if (g < 0) g = 0;
            if (b > 255) b = 255; else if (b < 0) b = 0;
            uint16_t out = ((r >> 3) << 11) | ((g >> 2) << 5) | (b >> 3);
            buf[pos]     = out & 0xFF;
            buf[pos + 1] = (out >> 8) & 0xFF;
          }

          lv_obj_invalidate(id(album_art_background_widget));
          id(warm_tone_last_w) = w;
          ESP_LOGD("warm", "Warmth apply finished in %ums", (unsigned) (millis() - apply_start));
      - script.execute: ${warm_tone_post_script}
