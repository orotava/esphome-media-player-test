# =============================================================================
# MUSIC DASHBOARD - HTTP request, album art image
# =============================================================================
# Required for artwork_image (album art from Home Assistant entity_picture).
# Placeholder image shown until art is downloaded.
# =============================================================================

globals:
  - id: artwork_retry_pending
    type: bool
    initial_value: 'false'
  - id: artwork_download_stagger_ms
    type: int
    initial_value: '-1'

external_components:
  - source: github://orotava/esphome-media-player@main
    components: [artwork_image]
    refresh: 1s

http_request:
  id: http_req
  verify_ssl: ${ha_verify_ssl}

image:
  # ESPHome resolves local image files from the user's YAML folder, not the package checkout.
  - file: "https://raw.githubusercontent.com/jtenniswood/esphome-media-player/main/common/assets/placeholder.png"
    id: album_art_placeholder
    type: RGB565
    byte_order: ${image_byte_order}

artwork_image:
  - url: "https://placehold.co/${artwork_size}x${artwork_size}/2d2d2d/555555.jpg"
    id: album_art_background
    format: AUTO
    type: RGB565
    byte_order: ${image_byte_order}
    placeholder: album_art_placeholder
    resize: ${artwork_size}x${artwork_size}
    buffer_size: ${artwork_image_buffer_size}
    allow_insecure_local_urls: ${allow_insecure_local_artwork}
    on_download_finished:
      - script.execute: apply_downloaded_artwork
    on_error:
      - script.execute: handle_artwork_error

  - url: "https://placehold.co/${artwork_size}x${artwork_size}/2d2d2d/555555.jpg"
    id: tv_art_background
    format: AUTO
    type: RGB565
    byte_order: ${image_byte_order}
    placeholder: album_art_placeholder
    resize: ${artwork_size}x${artwork_size}
    buffer_size: ${artwork_image_buffer_size}
    allow_insecure_local_urls: ${allow_insecure_local_artwork}
    on_download_finished:
      - script.execute: apply_downloaded_artwork
    on_error:
      - script.execute: handle_artwork_error

script:
  - id: ensure_artwork_download_stagger
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(artwork_download_stagger_ms) < 0;'
          then:
            - lambda: |-
                const uint32_t window_ms = ${artwork_download_spread_ms};
                uint32_t stagger_ms = 0;
                if (window_ms > 0) {
                  uint8_t mac[6] = {0, 0, 0, 0, 0, 0};
                  esphome::get_mac_address_raw(mac);
                  uint32_t hash = 2166136261UL;
                  for (uint8_t byte : mac) {
                    hash ^= byte;
                    hash *= 16777619UL;
                  }
                  stagger_ms = hash % window_ms;
                }
                id(artwork_download_stagger_ms) = static_cast<int>(stagger_ms);
                ESP_LOGD("artwork", "Artwork download stagger: %u ms", static_cast<unsigned>(stagger_ms));

  - id: apply_downloaded_artwork
    mode: queued
    then:
      - lvgl.widget.hide: artwork_error_label
      - lambda: 'id(artwork_retry_pending) = false;'
      - lambda: |-
          auto *img = id(is_tv_mode) ? id(tv_art_background) : id(album_art_background);
          int iw = img->get_width();
          int ih = img->get_height();
          ESP_LOGD("artwork", "Apply start: mode=%s image=%dx%d",
                   id(is_tv_mode) ? "tv" : "music", iw, ih);
          auto *w = id(album_art_background_widget);
          constexpr int display_size = ${artwork_display_size};
          int dim = (iw < ih) ? iw : ih;
          if (!id(is_tv_mode) && dim > 0 && dim < display_size) {
            int zoom = (256 * display_size + dim - 1) / dim;
            lv_img_set_zoom(w, zoom);
            lv_img_set_offset_x(w, 0);
            lv_img_set_offset_y(w, 0);
            lv_obj_set_size(w, iw, ih);
            int offset = (display_size - dim) / 2;
            lv_obj_set_pos(w, offset, offset);
          } else {
            lv_img_set_zoom(w, 256);
            lv_img_set_offset_x(w, 0);
            lv_img_set_offset_y(w, 0);
            lv_obj_set_size(w, iw, ih);
            lv_obj_set_pos(w, (display_size - iw) / 2, (display_size - ih) / 2);
          }
      - if:
          condition:
            lambda: 'return id(is_tv_mode);'
          then:
            - lvgl.image.update:
                id: album_art_background_widget
                src: tv_art_background
          else:
            - lvgl.image.update:
                id: album_art_background_widget
                src: album_art_background
      - lvgl.widget.update:
          id: album_art_background_widget
          opa: 100%
      - script.execute: extract_accent_color
      - script.wait: extract_accent_color
      - script.execute: ${post_artwork_script}
      - lambda: 'ESP_LOGD("artwork", "Apply finished");'

  - id: handle_artwork_error
    mode: restart
    then:
      - lambda: |-
          const std::string &url = id(is_tv_mode) ? id(last_tv_artwork_url) : id(last_artwork_url);
          ESP_LOGW("artwork", "Artwork download failed: %s", url.c_str());
      - lvgl.widget.update:
          id: album_art_background_widget
          opa: 0%
      - if:
          condition:
            lambda: 'return !id(artwork_retry_pending);'
          then:
            - lambda: 'id(artwork_retry_pending) = true;'
            - script.execute: ensure_artwork_download_stagger
            - script.wait: ensure_artwork_download_stagger
            - delay: !lambda 'return static_cast<uint32_t>(1000 + id(artwork_download_stagger_ms));'
            - lambda: |-
                auto *img = id(is_tv_mode) ? id(tv_art_background) : id(album_art_background);
                const std::string &url = id(is_tv_mode) ? id(last_tv_artwork_url) : id(last_artwork_url);
                if (!url.empty()) {
                  ESP_LOGI("artwork", "Retrying artwork download: %s", url.c_str());
                  img->set_url(url);
                  img->update();
                }
          else:
            - lambda: |-
                id(artwork_retry_pending) = false;
                ESP_LOGW("artwork", "Retry also failed — clearing stale artwork");
